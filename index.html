<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手交換平台</title>
    <style>
        :root {
            --bg: #f8f6f2;
            --surface: #ffffff;
            --primary: #d9773a;
            --primary-light: #fef7f2;
            --primary-hover: #b85e2c;
            --active-color: #2f6b4a;
            --active-bg: #e9f5ee;
            --done-color: #7e7e7e;
            --done-bg: #f0f0f0;
            --cancelled-color: #8c6d5c;
            --cancelled-bg: #f6f1ec;
            --text: #2c2416;
            --text-secondary: #5e5547;
            --text-muted: #8a8178;
            --border: #e0d8cc;
            --border-light: #ede6db;
            --shadow-sm: 0 2px 6px rgba(44, 36, 22, 0.04), 0 1px 3px rgba(44, 36, 22, 0.03);
            --shadow-md: 0 6px 18px rgba(44, 36, 22, 0.06), 0 2px 6px rgba(44, 36, 22, 0.04);
            --shadow-lg: 0 12px 28px rgba(44, 36, 22, 0.08), 0 4px 10px rgba(44, 36, 22, 0.05);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            --font-sans: 'Inter', 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 20% 15%, rgba(217, 119, 58, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 85%, rgba(47, 107, 74, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(160, 140, 110, 0.02) 0%, transparent 65%);
        }

        /* ===== HEADER ===== */
        .app-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #f5a060, var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(217, 119, 58, 0.2);
            transition: transform var(--transition);
        }
        .header-icon:hover {
            transform: scale(1.05);
        }

        .header-title {
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
            line-height: 1.3;
        }
        .header-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            letter-spacing: 0.02em;
        }

        /* ===== CONTAINER ===== */
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* ===== FORM CARD ===== */
        .form-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 28px 28px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: box-shadow var(--transition);
        }
        .form-card:hover {
            box-shadow: var(--shadow-lg);
        }
        .form-card__title {
            font-size: 1.1rem;
            font-weight: 650;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }
        .form-card__title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            display: inline-block;
            box-shadow: 0 0 0 3px rgba(217, 119, 58, 0.15);
        }
        .form-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }
        .form-group label {
            font-size: 0.84rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }
        .form-group label .required-star {
            color: #e8553a;
            margin-left: 3px;
            font-weight: 700;
        }
        .form-group input {
            padding: 12px 15px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-sans);
            transition: all var(--transition);
            background: #fdfcf9;
            color: var(--text);
            outline: none;
            width: 100%;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(217, 119, 58, 0.1);
            background: #fff;
            transform: translateY(-1px);
        }
        .btn-submit {
            padding: 12px 28px;
            background: linear-gradient(135deg, #f5a060, var(--primary));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 650;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.03em;
            white-space: nowrap;
            box-shadow: 0 4px 14px rgba(217, 119, 58, 0.3);
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateY(0);
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #f8b870, #e08a4a);
            box-shadow: 0 8px 22px rgba(217, 119, 58, 0.4);
            transform: translateY(-2px);
        }
        .btn-submit:active {
            transform: scale(0.97);
            transition: 0.1s;
        }

        /* ===== TOOLBAR ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 22px;
        }
        .filter-group {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border-radius: 32px;
            padding: 5px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 550;
            color: var(--text-secondary);
            transition: all var(--transition);
            letter-spacing: 0.02em;
            white-space: nowrap;
            font-family: var(--font-sans);
            position: relative;
        }
        .filter-btn:hover {
            color: var(--text);
            background: rgba(0, 0, 0, 0.04);
            transform: translateY(-1px);
        }
        .filter-btn--active {
            background: var(--text);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(44, 36, 22, 0.2);
            transform: translateY(-1px);
        }
        .filter-btn--active:hover {
            background: #3d3528;
            color: #fff;
            transform: translateY(-1px);
        }
        .record-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-left: auto;
        }
        .record-count strong {
            color: var(--text);
            font-weight: 650;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 6px 16px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(217, 119, 58, 0.1);
        }
        .search-box input {
            border: none;
            outline: none;
            font-size: 0.88rem;
            background: transparent;
            color: var(--text);
            width: 160px;
            font-family: var(--font-sans);
        }
        .search-box input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }
        .search-box .search-icon {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* ===== CHART SECTION ===== */
        #chart-section {
            margin-bottom: 24px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        .chart-title {
            font-size: 0.9rem;
            font-weight: 650;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
        }
        .chart-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chart-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .chart-count {
            font-weight: 700;
            color: var(--text);
        }
        .chart-bar-bg {
            height: 12px;
            background: var(--border-light);
            border-radius: 20px;
            overflow: hidden;
        }
        .chart-bar-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .chart-bar-fill.active-bar {
            background: var(--active-color);
        }
        .chart-bar-fill.done-bar {
            background: var(--done-color);
        }
        .chart-bar-fill.cancelled-bar {
            background: var(--cancelled-color);
        }

        /* ===== CARD GRID ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transform: translateY(0);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
            border-color: #d9cec0;
        }
        .card--done {
            background: var(--done-bg);
            border-color: #e5e0d8;
            opacity: 0.85;
        }
        .card--done:hover {
            opacity: 0.92;
            border-color: #d5cfc4;
        }
        .card--cancelled {
            background: var(--cancelled-bg);
            border-color: #e0d7ce;
            opacity: 0.85;
        }
        .card--cancelled:hover {
            opacity: 0.92;
            border-color: #d0c5b8;
        }
        .card__status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 5px 14px;
            border-radius: 20px;
            text-transform: uppercase;
            pointer-events: none;
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.7);
        }
        .card--active .card__status-badge {
            background: var(--active-bg);
            color: var(--active-color);
        }
        .card--done .card__status-badge {
            background: #e4e0d8;
            color: var(--done-color);
        }
        .card--cancelled .card__status-badge {
            background: #e6ddd4;
            color: var(--cancelled-color);
        }
        .card__title {
            font-size: 1.18rem;
            font-weight: 700;
            color: var(--text);
            padding-right: 85px;
            line-height: 1.35;
            word-break: break-word;
        }
        .card--done .card__title {
            color: #6b6b6b;
            text-decoration: line-through;
            text-decoration-color: #a09888;
        }
        .card--cancelled .card__title {
            color: #7a6d60;
            font-style: italic;
        }
        .card__price {
            font-size: 1.6rem;
            font-weight: 750;
            color: #c96e2a;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }
        .card--done .card__price,
        .card--cancelled .card__price {
            color: #968b7e;
        }
        .card__desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            min-height: 1.6em;
        }
        .card__meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card__actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .btn-action {
            padding: 9px 16px;
            border-radius: 22px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 550;
            transition: all var(--transition);
            font-family: var(--font-sans);
            color: var(--text-secondary);
            flex: 1;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        .btn-action:hover {
            background: #fdfaf6;
            border-color: #c4b8a2;
            transform: translateY(-1px);
        }
        .btn-action--primary {
            border-color: #d4c8b0;
            color: #6d5638;
            background: #fefbf7;
        }
        .btn-action--primary:hover {
            background: #fef7f0;
            border-color: #c49a6c;
            color: #543f2a;
        }
        .btn-action--warning {
            border-color: #e0d0c0;
            color: #7a5f4b;
            background: #faf7f4;
        }
        .btn-action--warning:hover {
            background: #faf3eb;
            border-color: #c4a88c;
            color: #634b38;
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        .empty-state__icon {
            font-size: 48px;
            opacity: 0.7;
            display: block;
            margin-bottom: 12px;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #2c2416;
            color: #fff;
            padding: 14px 28px;
            border-radius: 34px;
            font-size: 0.9rem;
            font-weight: 550;
            z-index: 999;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            backdrop-filter: blur(8px);
        }
        .toast--visible {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-container {
                padding: 16px 12px;
            }
            .form-card {
                padding: 20px 16px;
                border-radius: var(--radius);
            }
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
            .form-group {
                min-width: 100%;
            }
            .btn-submit {
                width: 100%;
                justify-content: center;
                padding: 13px;
                font-size: 1rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .filter-group {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            .filter-btn {
                padding: 8px 16px;
                font-size: 0.82rem;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .record-count {
                text-align: center;
                margin-left: 0;
            }
            .search-box {
                width: 100%;
            }
            .search-box input {
                width: 100%;
            }
            .card {
                padding: 18px 16px;
            }
            .card__title {
                font-size: 1.08rem;
                padding-right: 75px;
            }
            .card__price {
                font-size: 1.4rem;
            }
            .header-inner {
                padding: 0 16px;
            }
            .header-title {
                font-size: 1.25rem;
            }
        }
        @media (max-width: 400px) {
            .filter-btn {
                padding: 7px 12px;
                font-size: 0.78rem;
            }
            .btn-action {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="header-icon">🔄</div>
            <div>
                <span class="header-title">二手交換平台</span>
                <span class="header-subtitle">讓閒置物品找到新主人</span>
            </div>
        </div>
    </header>

    <main class="app-container">
        <section class="form-card">
            <div class="form-card__title"><span class="dot"></span> 刊登二手物品</div>
            <form id="item-form" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="input-itemName">物品名稱<span class="required-star">*</span></label>
                        <input type="text" id="input-itemName" name="itemName" placeholder="例如：iPhone 14 Pro" required maxlength="80" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="input-price">價格<span class="required-star">*</span></label>
                        <input type="number" id="input-price" name="price" placeholder="例如：15000" required min="1" max="99999999" step="1" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="input-description">物品描述</label>
                        <input type="text" id="input-description" name="description" placeholder="簡短描述物品狀況（選填）" maxlength="200" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-submit"><span>＋</span> 刊登物品</button>
                </div>
            </form>
        </section>

        <div class="toolbar">
            <div class="filter-group" role="group" aria-label="篩選狀態">
                <button class="filter-btn filter-btn--active" data-filter="all">📋 全部</button>
                <button class="filter-btn" data-filter="active">🟢 販售中</button>
                <button class="filter-btn" data-filter="done">🏷️ 已售出</button>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="搜尋物品...">
            </div>
            <span class="record-count" id="record-count">共 <strong>0</strong> 筆物品</span>
        </div>

        <!-- 新增統計圖表區 -->
        <section id="chart-section">
            <div class="chart-title">📊 物品狀態分佈</div>
            <div class="chart-grid">
                <div class="chart-item">
                    <div class="chart-label">
                        <span>🟢 販售中</span>
                        <span class="chart-count" id="chart-active-count">0</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill active-bar" id="chart-active-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="chart-item">
                    <div class="chart-label">
                        <span>🏷️ 已售出</span>
                        <span class="chart-count" id="chart-done-count">0</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill done-bar" id="chart-done-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="chart-item">
                    <div class="chart-label">
                        <span>🚫 已下架</span>
                        <span class="chart-count" id="chart-cancelled-count">0</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill cancelled-bar" id="chart-cancelled-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card-grid" id="card-grid" aria-label="物品列表"></section>
    </main>

    <div class="toast" id="toast" aria-live="polite"></div>

    <script>
        (function() {
            // ========== 設定 ==========
            const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwrTASvCj4_HzK_GIascz159wdYPj2AfcusG72H353JIEEIcp0Pumc09vP8n6aN0PNgw/exec";
            const STORAGE_KEY = 'records';
            const TOAST_DURATION = 2000;

            const form = document.getElementById('item-form');
            const inputItemName = document.getElementById('input-itemName');
            const inputPrice = document.getElementById('input-price');
            const inputDescription = document.getElementById('input-description');
            const cardGrid = document.getElementById('card-grid');
            const recordCountEl = document.getElementById('record-count');
            const toastEl = document.getElementById('toast');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const searchInput = document.getElementById('search-input');

            let currentFilter = 'all';
            let currentSearch = '';
            let toastTimer = null;

            // ========== Google Sheets 連接 ==========
            function normalizeRecord(sheetRecord) {
                const mapping = {
                    'id': 'id',
                    'createdat': 'createdAt',
                    'status': 'status',
                    'itemname': 'itemName',
                    'price': 'price',
                    'description': 'description'
                };
                const normalized = {};
                Object.keys(sheetRecord).forEach(key => {
                    const lowerKey = key.toLowerCase().trim();
                    const frontendKey = mapping[lowerKey];
                    if (frontendKey) {
                        let value = sheetRecord[key];
                        if (frontendKey === 'price') {
                            value = Number(value) || 0;
                        }
                        if (frontendKey === 'status') {
                            const validStatuses = ['active', 'done', 'cancelled'];
                            if (!validStatuses.includes(value)) {
                                value = 'active';
                            }
                        }
                        normalized[frontendKey] = value;
                    } else {
                        normalized[key] = sheetRecord[key];
                    }
                });
                return normalized;
            }

            async function syncToSheet(payload) {
                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (!result.ok) {
                        console.warn('syncToSheet 失敗:', result.error);
                    }
                } catch (err) {
                    console.warn('syncToSheet 網路錯誤:', err);
                }
            }

            async function fetchRecordsFromSheet() {
                try {
                    const response = await fetch(APPS_SCRIPT_URL);
                    const data = await response.json();
                    if (data.ok && Array.isArray(data.records)) {
                        return data.records.map(normalizeRecord);
                    }
                    return null;
                } catch (err) {
                    console.warn('fetchRecordsFromSheet 失敗:', err);
                    return null;
                }
            }

            // ========== 核心資料函式 ==========
            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return [];
                    const parsed = JSON.parse(raw);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) {
                    console.warn('loadData 失敗', e);
                    return [];
                }
            }

            function saveData(record) {
                if (!record || typeof record !== 'object') return;
                const records = loadData();
                records.push(record);
                _writeToStorage(records);
                syncToSheet({ action: 'create', record });
            }

            function updateRecord(id, changes) {
                if (!id || !changes) return;
                const records = loadData();
                const index = records.findIndex(r => r.id === id);
                if (index === -1) return;
                records[index] = { ...records[index], ...changes };
                _writeToStorage(records);
                syncToSheet({ action: 'update', id, changes });
            }

            function createRecord(formData) {
                return {
                    id: _generateId(),
                    createdAt: new Date().toISOString(),
                    status: 'active',
                    itemName: String(formData.itemName || '').trim(),
                    price: Number(formData.price) || 0,
                    description: String(formData.description || '').trim(),
                };
            }

            // ========== 初始化 ==========
            async function initData() {
                const sheetRecords = await fetchRecordsFromSheet();
                if (sheetRecords && sheetRecords.length > 0) {
                    _writeToStorage(sheetRecords);
                    console.log('✅ 從 Google Sheet 載入 ' + sheetRecords.length + ' 筆記錄');
                } else if (sheetRecords && sheetRecords.length === 0) {
                    const localRecords = loadData();
                    if (localRecords.length > 0) {
                        console.log('📤 將 localStorage 的 ' + localRecords.length + ' 筆記錄同步至 Sheet');
                        for (const rec of localRecords) {
                            await syncToSheet({ action: 'create', record: rec });
                        }
                    }
                } else {
                    console.log('⚠️ 無法連線 Google Sheet，使用 localStorage 離線資料');
                }
                _refreshDisplay();
            }

            // ========== 渲染函式 ==========
            function renderList(recordsToShow) {
                if (!Array.isArray(recordsToShow)) return;

                const allRecords = loadData();
                const activeCount = allRecords.filter(r => r.status === 'active').length;
                const doneCount = allRecords.filter(r => r.status === 'done').length;
                recordCountEl.innerHTML = `共 <strong>${allRecords.length}</strong> 筆物品（販售中：<strong>${activeCount}</strong> / 已售出：<strong>${doneCount}</strong>）`;

                cardGrid.innerHTML = '';

                if (recordsToShow.length === 0) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'empty-state';
                    let icon = '📭', text = '還沒有任何物品', sub = '快來刊登你的第一件二手物品吧！';
                    if (currentFilter === 'active') {
                        icon = '🛒'; text = '目前沒有販售中的物品';
                    } else if (currentFilter === 'done') {
                        icon = '📦'; text = '尚無已售出的物品';
                    } else if (currentSearch) {
                        icon = '🔍'; text = '找不到符合的物品'; sub = '試試其他關鍵字';
                    }
                    emptyDiv.innerHTML = `<span class="empty-state__icon">${icon}</span><p>${text}</p><p style="color:#bfb5a5;">${sub}</p>`;
                    cardGrid.appendChild(emptyDiv);
                    return;
                }

                recordsToShow.forEach(record => {
                    cardGrid.appendChild(_buildCardElement(record));
                });
            }

            function _buildCardElement(record) {
                const status = record.status;
                const card = document.createElement('article');
                card.className = `card card--${status}`;
                card.setAttribute('data-id', record.id);

                const badgeText = status === 'active' ? '販售中' : (status === 'done' ? '已售出' : '已下架');
                const badge = document.createElement('span');
                badge.className = 'card__status-badge';
                badge.textContent = badgeText;

                const title = document.createElement('h3');
                title.className = 'card__title';
                title.textContent = record.itemName || '(未命名物品)';

                const price = document.createElement('p');
                price.className = 'card__price';
                price.textContent = 'NT$ ' + Number(record.price).toLocaleString('zh-TW');

                const desc = document.createElement('p');
                desc.className = 'card__desc';
                desc.textContent = record.description || '尚無描述';

                const meta = document.createElement('div');
                meta.className = 'card__meta';
                const timeStr = _formatDate(record.createdAt);
                meta.innerHTML = `🕐 <span>刊登於 ${timeStr}</span>`;

                const actions = document.createElement('div');
                actions.className = 'card__actions';

                if (status === 'active') {
                    const doneBtn = document.createElement('button');
                    doneBtn.className = 'btn-action btn-action--primary';
                    doneBtn.innerHTML = '✅ 標記已售出';
                    doneBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        updateRecord(record.id, { status: 'done' });
                        _refreshDisplay();
                        _showToast('🏷️ 已標記為「已售出」');
                    });
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'btn-action btn-action--warning';
                    cancelBtn.innerHTML = '🚫 取消上架';
                    cancelBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        updateRecord(record.id, { status: 'cancelled' });
                        _refreshDisplay();
                        _showToast('📴 物品已下架');
                    });
                    actions.appendChild(doneBtn);
                    actions.appendChild(cancelBtn);
                } else {
                    const relistBtn = document.createElement('button');
                    relistBtn.className = 'btn-action btn-action--primary';
                    relistBtn.innerHTML = '🔄 重新上架';
                    relistBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        updateRecord(record.id, { status: 'active' });
                        _refreshDisplay();
                        _showToast('🟢 已重新上架為「販售中」');
                    });
                    actions.appendChild(relistBtn);
                }

                card.appendChild(badge);
                card.appendChild(title);
                card.appendChild(price);
                card.appendChild(desc);
                card.appendChild(meta);
                card.appendChild(actions);
                return card;
            }

            // ========== 新增：圖表渲染 ==========
            function renderChart() {
                const all = loadData();
                const total = all.length || 1; // 避免除以零
                const activeCount = all.filter(r => r.status === 'active').length;
                const doneCount = all.filter(r => r.status === 'done').length;
                const cancelledCount = all.filter(r => r.status === 'cancelled').length;

                document.getElementById('chart-active-count').textContent = activeCount;
                document.getElementById('chart-done-count').textContent = doneCount;
                document.getElementById('chart-cancelled-count').textContent = cancelledCount;

                document.getElementById('chart-active-bar').style.width = (activeCount / total * 100) + '%';
                document.getElementById('chart-done-bar').style.width = (doneCount / total * 100) + '%';
                document.getElementById('chart-cancelled-bar').style.width = (cancelledCount / total * 100) + '%';
            }

            // ========== 輔助函式 ==========
            function _formatDate(isoStr) {
                if (!isoStr) return '未知時間';
                const d = new Date(isoStr);
                if (isNaN(d.getTime())) return '未知時間';
                const pad = (n) => String(n).padStart(2, '0');
                return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }

            function _generateId() {
                if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
                return 'rec_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 10);
            }

            function _writeToStorage(records) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                } catch (e) {
                    _showToast('⚠️ 儲存失敗，請檢查瀏覽器儲存空間');
                }
            }

            function _showToast(message) {
                if (toastTimer) clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.classList.add('toast--visible');
                toastTimer = setTimeout(() => {
                    toastEl.classList.remove('toast--visible');
                    toastTimer = null;
                }, TOAST_DURATION);
            }

            function _refreshDisplay() {
                const all = loadData();
                let filtered;
                if (currentFilter === 'active') {
                    filtered = all.filter(r => r.status === 'active');
                } else if (currentFilter === 'done') {
                    filtered = all.filter(r => r.status === 'done');
                } else {
                    filtered = [...all];
                }
                if (currentSearch.trim() !== '') {
                    const keyword = currentSearch.trim().toLowerCase();
                    filtered = filtered.filter(r => {
                        const name = (r.itemName || '').toLowerCase();
                        const desc = (r.description || '').toLowerCase();
                        return name.includes(keyword) || desc.includes(keyword);
                    });
                }
                renderList(filtered);
                renderChart(); // 新增呼叫
            }

            // ========== 事件綁定 ==========
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const itemName = inputItemName.value.trim();
                const priceRaw = inputPrice.value.trim();
                if (!itemName) { _showToast('⚠️ 請填寫物品名稱'); inputItemName.focus(); return; }
                if (!priceRaw || isNaN(Number(priceRaw)) || Number(priceRaw) < 1) {
                    _showToast('⚠️ 價格必須是大於 0 的數字'); inputPrice.focus(); return;
                }
                const record = createRecord({
                    itemName,
                    price: Number(priceRaw),
                    description: inputDescription.value
                });
                saveData(record);
                form.reset();
                inputItemName.focus();
                _refreshDisplay();
                _showToast('✅ 物品刊登成功！');
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filterVal = btn.getAttribute('data-filter');
                    if (currentFilter === filterVal) return;
                    currentFilter = filterVal;
                    filterBtns.forEach(b => b.classList.remove('filter-btn--active'));
                    btn.classList.add('filter-btn--active');
                    _refreshDisplay();
                });
            });

            searchInput.addEventListener('input', () => {
                currentSearch = searchInput.value;
                _refreshDisplay();
            });

            // 啟動
            initData();
            inputItemName.focus();
            console.log('✅ 二手交換平台（含搜尋 + 圖表）初始化完成');
        })();
    </script>
</body>
</html>
